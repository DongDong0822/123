name: Build GboardToolbar + Repackage tipa

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun clang -arch arm64 -isysroot "$SDK" \
            -dynamiclib -fobjc-arc \
            -framework UIKit -framework Foundation \
            -install_name @executable_path/GboardToolbar.dylib \
            -o GboardToolbar.dylib GboardToolbar.m

      - name: Build insert_dylib
        run: |
          git clone --depth 1 https://github.com/Tyilo/insert_dylib
          cd insert_dylib
          xcodebuild -target insert_dylib -configuration Release SYMROOT=build > /dev/null
          cp build/Release/insert_dylib ../insert_dylib_bin
          cd ..

      - name: Patch & repackage tipa
        run: |
          TIPA=$(ls Gboard*.tipa | head -1)
          echo "Using: $TIPA"
          mkdir -p tipa_work
          cp "$TIPA" tipa_work/app.zip
          cd tipa_work && unzip -q app.zip
          APP=$(find Payload -name "*.app" -maxdepth 1 | head -1)
          BIN="$APP/$(defaults read "$(pwd)/$APP/Info" CFBundleExecutable)"
          cp ../GboardToolbar.dylib "$APP/GboardToolbar.dylib"
          ../insert_dylib_bin --strip-codesig @executable_path/GboardToolbar.dylib "$BIN"
          zip -qr ../Gboard-Patched.tipa Payload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gboard-Patched-tipa
          path: Gboard-Patched.tipa
          retention-days: 7
